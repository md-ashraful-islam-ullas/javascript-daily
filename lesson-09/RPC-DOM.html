<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors</title>
  </head>
  <body>
    <p>Rock-Paper-Scissors</p>

    <button onclick="playGame('Rock')">Rock</button>

    <button onclick="playGame('Paper')">Paper</button>

    <button onclick="playGame('Scissors')">Scissors</button>

    <button
      onclick="
        score.Win = 0;
        score.Losses = 0;
        score.Tie = 0;
        localStorage.removeItem('score-f');
        updateScoreElement();
      "
    >
      Reset score
    </button>

    <p class="js-result"></p>
    <p class="js-move-both"></p>
    <p class="js-score"></p>

    <script>
      const score = JSON.parse(localStorage.getItem("score-f")) || {
        Win: 0,
        Losses: 0,
        Tie: 0,
      };

      updateScoreElement();

      function playGame(playerMove) {
        const computerMove = pickComputerMove();

        let result = "";

        if (playerMove === "Scissors") {
          if (computerMove === "Rock") {
            result = "You Lose.";
          } else if (computerMove === "Paper") {
            result = "You Win.";
          } else if (computerMove === "Scissors") {
            result = "Tie.";
          }
        } else if (playerMove === "Paper") {
          if (computerMove === "Rock") {
            result = "You Win.";
          } else if (computerMove === "Paper") {
            result = "Tie.";
          } else if (computerMove === "Scissors") {
            result = "You Lose.";
          }
        } else if (playerMove === "Rock") {
          if (computerMove === "Rock") {
            result = "Tie.";
          } else if (computerMove === "Paper") {
            result = "You Lose.";
          } else if (computerMove === "Scissors") {
            result = "You Win.";
          }
        }

        if (result === "You Win.") {
          score.Win++;
        } else if (result === "You Lose.") {
          score.Losses++;
        } else {
          score.Tie++;
        }

        localStorage.setItem("score-f", JSON.stringify(score));

        // alert(
        //   `You picked ${playerMove}. Computer picked ${computerMove}. ${result}.\nWins: ${score.Win}, Losses: ${score.Losses}, Tie: ${score.Tie}`,
        // );

        updateFinalResult(result);
        moveMeComputer(playerMove, computerMove);
        updateScoreElement();
      }

      function updateScoreElement() {
        document.querySelector(".js-score").innerHTML =
          `Wins: ${score.Win}, Losses: ${score.Losses}, Tie: ${score.Tie}`;
      }

      function updateFinalResult(result) {
        document.querySelector('.js-result').innerHTML = result;
      }

      function moveMeComputer(playerMove, computerMove) {
        document.querySelector('.js-move-both').innerHTML = `You ${playerMove} - ${computerMove} Computer`;
      }

      function pickComputerMove() {
        let computerMove = "";
        const randomNumber = Math.random();
        if (randomNumber >= 0 && randomNumber < 1 / 3) {
          computerMove = "Rock";
        } else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
          computerMove = "Paper";
        } else if (randomNumber >= 2 / 3 && randomNumber < 1) {
          computerMove = "Scissors";
        }

        return computerMove;
      }
    </script>
  </body>
</html>
