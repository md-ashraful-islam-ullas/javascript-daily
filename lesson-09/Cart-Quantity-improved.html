<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cart Quantity</title>
  </head>
  <body>
    <p>Cart Quantity</p>
    <br />
    <button onclick="showQuantityWeb();">Show Quantity</button>

    <button onclick="updateCartQuantity(1); showQuantityWeb();">Add to Cart</button>

    <button onclick="updateCartQuantity(2); showQuantityWeb();">+2</button>

    <button onclick="updateCartQuantity(3); showQuantityWeb();">+3</button>

    <button onclick="updateCartQuantity(4); showQuantityWeb();">+4</button>

    <button onclick="updateCartQuantity(5); showQuantityWeb();">+5</button> <br /><br />

    <button onclick="updateCartQuantity(-1); showQuantityWeb();">Remove from Cart</button>

    <button onclick="updateCartQuantity(-2); showQuantityWeb();">-2</button>

    <button onclick="updateCartQuantity(-3); showQuantityWeb();">-3</button>

    <button onclick="resetCart(); showQuantityWeb();">Reset Cart</button>

    <p class="js-quantity"></p>

    <script>
      let cartQuantity = 0;
      showQuantityWeb();

    //   function showQuantity() {
    //     console.log(`Cart Quantity: ${cartQuantity}`);
    //   }

    function showQuantityWeb() {
        document.querySelector('.js-quantity').innerHTML = `Cart Quantity: ${cartQuantity}`;
    }

      function updateCartQuantity(amount) {
        const newQuantity = cartQuantity + amount;

        if (newQuantity > 10) {
          console.log("The cart is full.");
          return;
        }

        if (newQuantity < 0) {
          console.log("Not enough items in the cart.");
          return;
        }

        cartQuantity = newQuantity;
        console.log(`Cart Quantity: ${cartQuantity}`);
      }

      function resetCart() {
        cartQuantity = 0;
        console.log("Cart was reset.");
        console.log(`Cart Quantity: ${cartQuantity}`);
      }
    </script>
  </body>
</html>
