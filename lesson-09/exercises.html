<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DOM Exercises</title>
  </head>
  <body>
    <button class="js-9a">9a</button>
    <button class="js-9b">9b</button> <br /><br />

    <button
      onclick="
        document.querySelector('.js-select').innerHTML = `You Choose: Head`
      "
    >
      Head
    </button>
    <button
      onclick="
        document.querySelector('.js-select').innerHTML = `You Choose: Tail`
      "
    >
      Tail
    </button>
    <p class="js-select"></p>
    <br /><br />

    <input
      type="text"
      placeholder="Your Name: "
      class="js-name-input"
      onkeydown="handleSubmitkeydown(event)"
    />
    <button onclick="showName()">Submit</button>
    <p class="js-display-name"></p>

    <script>
      console.log(document.querySelector(".js-9a"));
      document.querySelector(".js-9b").innerHTML = "9b done!";

      //  --------
      function showName() {
        const name = document.querySelector(".js-name-input").value;
        document.querySelector(".js-display-name").innerHTML =
          `Your Name: ${name}`;
      }

      function handleSubmitkeydown(event) {
        if (event.key === "Enter") {
          showName();
        }
      }
    </script>
  </body>
</html>
