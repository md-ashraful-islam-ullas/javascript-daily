<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>booleans</title>
</head>
<body>
    <script>
        console.log(3 < 5);
        console.log(5 > 10);
        console.log(typeof true);
        console.log(5 === '5.00');

        if (!true) {
            console.log('hello');
        }
        else {
            console.log('else');
        }

        if (15 >= 16) {
            console.log("You can drive");
        } else if (15 >= 14) {
            console.log('Almost there.');
        } else {
            console.log('You cannot drive.');
        }
    </script>
</body>
</html>
